services:
  app:
    build: .
    container_name: hono-backend-starter
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hono_db
      - JWT_SECRET=your-super-secret-production-jwt-key
      - RATE_LIMIT_MAX=100
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, -f, 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # 卷挂载 (可选，用于持久化日志)
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: hono-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hono_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
